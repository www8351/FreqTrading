name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: lint & test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # MetaTrader5 is Windows-only and env-marked, so it is skipped here;
        # the engine itself is stdlib and fully testable on Linux.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (flake8) — critical errors block
        # Syntax errors, undefined names and the like fail the build.
        run: flake8 . --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint (flake8) — full, advisory
        # Style/complexity drift is surfaced but does not block on pre-existing
        # findings; tighten by removing continue-on-error once the tree is clean.
        continue-on-error: true
        run: flake8 . --count --statistics

      - name: Format check (black) — advisory
        # Advisory until a one-off repo-wide `black .` pass lands; surfaces drift
        # without blocking CI on pre-existing style.
        continue-on-error: true
        run: black --check --diff .

      - name: Tests (pytest)
        run: pytest -q
